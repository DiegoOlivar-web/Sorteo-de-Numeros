<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plantilla de Sorteo - 50 Números</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <h1>SORTEO DEL BAILETON<br>PRO SALUD</h1>
    </header>

    <main class="app-container">
      <!-- Columna 1: Imagen, contadores y acciones -->
      <div class="sticky-side">
        <section class="card">
          <label for="image-upload" class="image-preview-box" id="preview-container">
            <img id="raffle-image" src="" alt="Imagen del Premio" />
            <div class="image-placeholder" id="placeholder-text">
              <svg viewBox="0 0 24 24">
                <path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
              </svg>
              <p><strong>Subir Imagen del Premio</strong></p>
              <p style="font-size:0.8rem; margin-top:4px;">Toca para cargar afiche</p>
            </div>
          </label>
          <input type="file" id="image-upload" class="file-input" accept=".jpg, .jpeg, .png, .webp, .gif, image/jpeg, image/png, image/webp" />
          <div class="stats-box">
            <div>Vendidos: <span id="count-filled">0</span> / 50</div>
            <div>Disponibles: <span id="count-empty">50</span></div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="btn-export">
              📥 Exportar Lista a Texto
            </button>
            <button class="btn btn-danger" id="btn-reset">
              🗑️ Limpiar Sorteo
            </button>
          </div>
        </section>
      </div>

      <!-- Columna 2: Cuadrícula de 50 números -->
      <section class="numbers-grid" id="grid-container"></section>
    </main>
    <div id="toast" class="toast">Guardado en tiempo real</div>
  </body>
</html>
